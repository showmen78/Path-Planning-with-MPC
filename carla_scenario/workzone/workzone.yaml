name: workzone
runner_module: carla_scenario.test_scenario.custom_map4_runner

carla:
  host: 127.0.0.1
  port: 2000
  timeout_s: 10.0
  synchronous_mode: true
  fixed_delta_seconds: 0.05
  launch_if_needed: true
  launch_timeout_s: 120.0
  carla_root: /home/umd-user/carla_source/carla
  launch_mode: ue4editor_map
  rhi: -vulkan

  # Imported Unreal scene asset to load at startup.
  map: /Game/workzone/Maps/workzone/workzone

anchors:
  ego_spawn: cav_spawn
  final_destination: final_destination

obstacles:
  environment_name_prefix: obstacle

ego:
  blueprint: vehicle.tesla.model3
  role_name: ego
  color_rgb: "255,0,0"
  spawn_z_offset_m: 1.0

constraints:
  min_velocity_mps: 0.0
  max_velocity_mps: 20.0
  min_acceleration_mps2: -10.0
  max_acceleration_mps2: 3.0
  max_jerk_mps3: 10.0
  min_steer_rad: -0.6
  max_steer_rad: 0.6
  min_steer_rate_rps: -0.3
  max_steer_rate_rps: 0.3
  enforce_terminal_velocity_constraint: false
  terminal_velocity_mps: 0.0

planning:
  waypoint_sample_distance_m: 2.0
  route_rebuild_period_s: 1.0
  prompt_period_s: 1.0

camera:
  enabled: true
  image_size_x: 960
  image_size_y: 750
  fov: 90.0
  topdown:
    world_fixed: false
    height: 65.0
    padding_m: 20.0
  chase:
    back: 8.0
    height: 2.8
    pitch: -10.0
