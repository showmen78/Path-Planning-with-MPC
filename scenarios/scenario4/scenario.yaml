simulation:
  dt_s: 0.05
  start_delay_s: 0
  target_fps: 60
  visualization_horizon_s: 5.0
  replan_buffer_steps: 50
  plot_width_scale: 0.6
  plot_height_scale: 2.4
  plot_trajectory_height_scale: 1.0
  background_color_rgb:
  - 168
  - 192
  - 136
window:
  width_px: 2500
  height_px: 1200
  title: MPC Custom - Curved 4-Lane Scenario
  pixels_per_meter: 15.0
road:
  lane_count: 4
  lane_width_m: 3.66
  center_y_m: 0.0
  camera_center_x_m: 0.0
  visible_x_margin_m: 10.0
  waypoint_spacing_m: 1.0
  show_lane_waypoints: true
  waypoint_color_rgb:
  - 70
  - 190
  - 90
  waypoint_radius_px: 2
  waypoint_draw_stride: 1
  boundary_color_rgb:
  - 245
  - 245
  - 245
  lane_line_color_rgb:
  - 230
  - 230
  - 230
  road_color_rgb:
  - 56
  - 56
  - 56
  type: curved
  curve:
    amplitude_m: 6 
    wavelength_m: 160.0
    x_reference_m: -80.0
    phase_rad: 0.0
    draw_step_m: 0.5
destination:
- 70.0
- -4
- 0.0
- 0.0
mpc:

  local_goal:
    v_ref_mps: 10
    lock_to_final_distance_m: 2.0
  constraints:
    min_velocity_mps: 0.0
    max_velocity_mps: 10.0
    min_acceleration_mps2: -4
    max_acceleration_mps2: 2.5
    max_jerk_mps3: 10.0
    min_steer_rad: -0.6 #0.6
    max_steer_rad: 0.6
    min_steer_rate_rps: -0.4 #0.5
    max_steer_rate_rps: 0.4
    enforce_terminal_velocity_constraint: false  # Scenario4: disable hard terminal-speed equality in QP for now.
    terminal_velocity_mps: 0.0  # Used only when enforce_terminal_velocity_constraint is true.
tracker:
  polynomial_degree: 3
  fit_window_s: 4.0
  max_history_points: 200
  min_points_for_polyfit: 3
vehicles:
