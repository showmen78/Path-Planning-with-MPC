simulation:
  dt_s: 0.05
  start_delay_s: 0
  target_fps: 60
  visualization_horizon_s: 3.0
  replan_buffer_steps: 20
  plot_width_scale: 0.6
  plot_height_scale: 2.4
  plot_trajectory_height_scale: 1.0
  background_color_rgb: [168, 192, 136]

window:
  width_px: 2500
  height_px: 1200
  title: "MPC Custom - Red Light Violation Warning"
  pixels_per_meter: 15.0

road:
  lane_count: 4
  lane_width_m: 3.66
  center_y_m: 0.0
  camera_center_x_m: 0.0
  visible_x_margin_m: 10.0
  waypoint_spacing_m: 1.0
  show_lane_waypoints: true
  waypoint_color_rgb: [70, 190, 90]
  waypoint_radius_px: 2
  waypoint_draw_stride: 1
  boundary_color_rgb: [245, 245, 245]
  lane_line_color_rgb: [230, 230, 230]
  road_color_rgb: [56, 56, 56]
  type: curved
  curve:
    # Different curve profile from scenario4.
    amplitude_m: 0.0
    wavelength_m: 110.0
    x_reference_m: -100.0
    phase_rad: 0.35
    draw_step_m: 0.5

# Final destination stays in the ego/reference lane.
destination: [90.0, -1.83, 0.0, 0.0]

behavior_planner:
  enabled: true
  traffic_light_vehicle_id: "traffic_light_proxy"
  trigger_distance_m: 40.0 #60
  stop_offset_before_light_m: 2.0
  yellow_color_rgb: [235, 190, 40]
  red_color_rgb: [230, 40, 40]

mpc:

  local_goal:
    v_ref_mps: 10
    lock_to_final_distance_m: 2.0
  constraints:
    min_velocity_mps: 0.0
    max_velocity_mps: 20.0
    min_acceleration_mps2: -5
    max_acceleration_mps2: 2.5
    max_jerk_mps3: 10.0
    min_steer_rad: -0.6
    max_steer_rad: 0.6
    min_steer_rate_rps: -0.4 #0.4
    max_steer_rate_rps: 0.4
    enforce_terminal_velocity_constraint: false
    terminal_velocity_mps: 0.0

tracker:
  polynomial_degree: 3
  fit_window_s: 4.0
  max_history_points: 200
  min_points_for_polyfit: 3

vehicles:
  # Ego: behind obstacle 2 in the adjacent lane.
  - vehicle_id: "ego"
    type: "ego"
    initial_state: [-80.0, -1.83, 0.0, 0.0] # +- 5.49, +- 1.83
    wheelbase_m: 2.0
    length_m: 4.5
    width_m: 2.0
    color_rgb: [30, 140, 240]

  # Obstacle 1: right-most lane, ahead of ego.
  - vehicle_id: "obs_lane_right"
    type: "surrounding_vehicle"
    initial_state: [-40.0, -5.49, 0.0, 0.0]
    motion_mode: "lane_waypoint_follow"
    desired_speed_mps: 3.0
    steer_kp: 1.8
    speed_kp: 1.5
    wheelbase_m: 2.0
    length_m: 4.5

    width_m: 2.0
    color_rgb: [220, 90, 90]

  # Obstacle 2: adjacent lane, beside obstacle 1.
  - vehicle_id: "obs_adjacent"
    type: "surrounding_vehicle"
    initial_state: [-30.0, -1.83, 0.0, 0.0]
    motion_mode: "lane_waypoint_follow"
    desired_speed_mps: 0.0
    steer_kp: 1.8
    speed_kp: 1.5
    wheelbase_m: 2.0
    length_m: 4.5
    width_m: 2.0
    color_rgb: [235, 170, 80]

      # Obstacle 2: adjacent lane, beside obstacle 1.
  - vehicle_id: "obs_adjacent34"
    type: "surrounding_vehicle"
    initial_state: [-60.0, 1.83, 0.0, 0.0]
    motion_mode: "lane_waypoint_follow"
    desired_speed_mps: 3.0
    steer_kp: 1.8
    speed_kp: 1.5
    wheelbase_m: 2.0
    length_m: 4.5
    width_m: 2.0
    color_rgb: [235, 170, 80]

  # Road-side obstacle (traffic light proxy), static and off lane.
  - vehicle_id: "traffic_light_proxy"
    type: "surrounding_vehicle"
    initial_state: [50.0, -8, 0.0, 0.0]
    motion_mode: "static"
    wheelbase_m: 1.0
    length_m: 1.2
    width_m: 1.2
    color_rgb: [230, 40, 40]
