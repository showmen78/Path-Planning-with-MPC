simulation:
  dt_s: 0.05
  start_delay_s: 0.0
  target_fps: 60
  visualization_horizon_s: 3.0
  replan_buffer_steps: 10
  plot_width_scale: 0.6
  plot_height_scale: 2.4
  plot_trajectory_height_scale: 1.0
  background_color_rgb: [168, 192, 136]
  repulsive_cost_distance_plot:
    enabled: true
    tracked_vehicle_id: "obs_rear_same_lane"
    # Keep only the approach branch of the curve so the plot shows how the
    # potential cost rises as the rear obstacle gets closer.
    truncate_at_min_distance: true

window:
  width_px: 1800
  height_px: 1000
  title: "MPC Custom - Potential Field Demo"
  pixels_per_meter: 15.0

road:
  lane_count: 4
  lane_width_m: 3.66
  center_y_m: 0.0
  camera_center_x_m: 0.0
  visible_x_margin_m: 10.0
  waypoint_spacing_m: 1.0
  show_lane_waypoints: true
  waypoint_color_rgb: [70, 190, 90]
  waypoint_radius_px: 2
  waypoint_draw_stride: 1
  boundary_color_rgb: [245, 245, 245]
  lane_line_color_rgb: [230, 230, 230]
  road_color_rgb: [56, 56, 56]
  type: straight

# Keep the final destination equal to the ego position so the ego has no
# travel objective in this demo. The executed ego state is also frozen by the
# scenario hook.
destination: [0.0, 1.83, 0.0, 0.0]

mpc:
  plot_cost: false
  plot_properties: false
  trajectory_generation_frequency_hz: 10.0
  constraints:
    # Keep the planned ego motion essentially stationary so the logged cost is
    # dominated by the changing obstacle distance, not by ego motion.
    min_velocity_mps: 0.0
    max_velocity_mps: 0.01
    min_acceleration_mps2: -0.1
    max_acceleration_mps2: 0.1
    max_jerk_mps3: 1.0
    min_steer_rad: -0.01
    max_steer_rad: 0.01
    min_steer_rate_rps: -0.05
    max_steer_rate_rps: 0.05
    enforce_terminal_velocity_constraint: false
    terminal_velocity_mps: 0.0

vehicles:
  # Ego is centered in lane 3 of a 4-lane road. The scenario hook keeps the
  # executed ego state fixed so the approaching obstacle is the only changing
  # factor in the repulsive-cost plot.
  - vehicle_id: "ego"
    type: "ego"
    initial_state: [0.0, 1.83, 0.0, 0.0]
    wheelbase_m: 2.0
    length_m: 4.5
    width_m: 2.0
    color_rgb: [30, 140, 240]

  # Rear obstacle starts in the same lane and drives straight toward the fixed
  # ego. It is the object tracked in the repulsive-cost-vs-distance plot.
  - vehicle_id: "obs_rear_same_lane"
    type: "surrounding_vehicle"
    initial_state: [-40.0, 1.83, 6.0, 0.0]
    motion_mode: "lane_straight"
    max_velocity_mps: 12.0
    max_acceleration_mps2: 3.0
    max_steer_rad: 0.6
    wheelbase_m: 2.0
    length_m: 4.5
    width_m: 2.0
    color_rgb: [235, 170, 80]
