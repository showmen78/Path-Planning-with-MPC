mpc:
  # Prediction horizon [s].
  # Increase -> planner can anticipate farther ahead, but the QP gets larger
  # and more expensive. Decrease -> faster solve, but shorter planning view.
  horizon_s: 3.0

  # MPC discretization step [s].
  # Increase -> fewer horizon steps and faster solve, but rougher dynamics.
  # Decrease -> finer dynamics and smoother planning, but larger QP size.
  # main.py currently syncs this with simulation.dt_s at runtime.
  plan_dt_s: 0.05

  # Replan frequency [Hz].
  # Increase -> fresher plans and better reaction to moving objects, but more
  # compute cost. Decrease -> cheaper runtime, but plans can go stale.
  trajectory_generation_frequency_hz: 2.0

  # Distance [m] below which the main loop considers the active destination
  # reached. Increase -> declare success earlier. Decrease -> require tighter
  # final convergence before stopping the run logic.
  destination_reached_threshold_m: 0.5

  # End-of-run plotting switches.
  # plot_cost: save cost plots.
  # plot_properties: save non-cost plots such as ego motion and planned-step
  # profile figures.
  plot_cost: true
  plot_properties: false

  # Per-replan plots built from the MPC-planned sequence itself, not the later
  # PID-followed controls applied to the simulated ego.
  planned_profile_plot:
    # Master switch for these planned-step profile plots.
    enabled: true

    # Number of early MPC stages k=0..steps_to_plot-1 to plot for each replan.
    # Increase -> more future stages are visualized. Decrease -> focus on the
    # very near-term MPC plan only.
    steps_to_plot: 5

  # Rolling temporary-destination settings shared by the scenario layer and the
  # MPC interface. These parameters control what destination state is fed into
  # the optimizer before each replan.
  local_goal:
    # Speed reference [m/s] attached to rolling temporary destinations.
    # Increase -> temporary goals encourage more aggressive cruising.
    # Decrease -> temporary goals become more conservative.
    v_ref_mps: 10.0

    # Number of waypoints ahead of the ego used to place the temporary
    # destination on the final-destination lane.
    # Increase -> farther temporary goal, smoother but less reactive.
    # Decrease -> nearer temporary goal, more reactive but can chatter.
    lookahead_waypoint_count: 20

    # Lock the temporary destination to the real final destination when the
    # temporary goal is this close [m] to the final stop/goal point.
    # Increase -> switch to final-goal behavior earlier.
    # Decrease -> keep rolling temporary goals active longer.
    lock_to_final_distance_m: 30.0

    # Final-goal success threshold [m] used by rolling-goal scenarios.
    # Increase -> easier to declare the final goal reached.
    # Decrease -> tighter final-position requirement.
    final_reached_threshold_m: 0.5

  # Speed-cap logic used when the active destination is a stop goal
  # (destination speed approximately zero). The cap is:
  #   v_cap(d) = min(v_max, sqrt(2 * a_brake * max(d - stop_buffer, 0)))
  # where a_brake is taken from abs(mpc.constraints.min_acceleration_mps2).
  final_stop_speed_cap:
    # Enable/disable the final-stop speed cap entirely.
    enabled: true

    # Activate the stop cap only when destination speed <= this threshold [m/s].
    # Increase -> more goals count as stop goals.
    # Decrease -> only near-zero-speed goals activate the cap.
    destination_speed_activation_threshold_mps: 0.05

    # Reserve this much distance [m] before the final stop point.
    # Increase -> stop earlier and more conservatively.
    # Decrease -> allow speed to stay higher closer to the stop point.
    stop_buffer_m: 10

  # Nominal rollout used only to generate the linearization point for LTV-MPC.
  # The rollout is a heuristic guessed trajectory; it is not the optimized
  # result. MPC linearizes around this guess and then solves the QP.
  reference_rollout:
    # Heading-controller gain used to turn heading error into guessed steering.
    # Increase -> sharper guessed steering. Decrease -> more timid rollout turn.
    heading_gain: 1.6

    # Speed-controller gain used to turn speed error into guessed acceleration.
    # Increase -> faster guessed accel/brake changes.
    # Decrease -> smoother but slower rollout speed adaptation.
    speed_gain: 1.2

    # If true, the rollout follows a per-stage lane-center path when waypoint
    # data is available. If false, it always points directly toward the active
    # destination state.
    prefer_lane_center_path: true

    # Blend between path tangent and line-of-sight heading in the rollout:
    #   0.0 -> pure path heading
    #   1.0 -> pure point-at-target heading
    # Increase -> more direct target pointing.
    # Decrease -> more lane/path-tangent following.
    path_los_heading_blend: 0.35

    # Reuse the previous solved MPC trajectory as the next rollout seed when
    # the current ego state still matches it closely.
    use_previous_solution_seed: true

    # Number of early stages searched when aligning the current ego state to the
    # previous solved plan.
    # Increase -> more chances to match a reused plan.
    # Decrease -> stricter, more local reuse only.
    previous_solution_search_steps: 15

    # Maximum allowed position mismatch [m] for previous-plan reuse.
    # Increase -> reuses old plans more often, even when stale.
    # Decrease -> rejects stale plans more aggressively.
    previous_solution_max_position_error_m: 3.0

    # Maximum allowed heading mismatch [rad] for previous-plan reuse.
    # Increase -> reuses old plans despite larger yaw mismatch.
    # Decrease -> requires tighter heading agreement.
    previous_solution_max_heading_error_rad: 0.75

    # Maximum allowed speed mismatch [m/s] for previous-plan reuse.
    # Increase -> more tolerant reuse.
    # Decrease -> more likely to rebuild rollout from scratch.
    previous_solution_max_speed_error_mps: 1.0

    # Number of sequential linearization / solve passes per replan.
    # Increase -> better local nonlinear consistency, but more CPU time.
    # Decrease -> faster replans, but more dependence on the initial guess.
    sequential_linearization_iterations: 2

    # Apply a simple lead-obstacle speed heuristic inside the rollout seed.
    # This only changes the guessed speed profile; the real obstacle avoidance
    # still comes from the MPC obstacle cost.
    obstacle_aware_speed_enabled: true

    # Prediction horizon [s] checked for lead obstacles in the rollout.
    # Increase -> rollout reacts to farther predicted traffic.
    # Decrease -> rollout only reacts to very near-term lead objects.
    obstacle_check_horizon_s: 4.0

    # Ignore lead obstacles beyond this along-track gap [m].
    # Increase -> rollout slows for farther objects.
    # Decrease -> rollout ignores farther lead objects.
    lead_obstacle_trigger_distance_m: 22.0

    # Extra lateral corridor margin [m] used to decide whether a predicted
    # obstacle belongs to the same rollout corridor.
    # Increase -> more obstacles count as lead obstacles.
    # Decrease -> only more aligned obstacles are considered.
    lead_obstacle_lateral_margin_m: 1.2

    # Longitudinal buffer [m] reserved before a lead obstacle when computing the
    # rollout speed limit.
    # Increase -> earlier and stronger rollout braking.
    # Decrease -> rollout can carry more speed toward the lead obstacle.
    lead_obstacle_stop_buffer_m: 8.0

    # Positive deceleration [m/s^2] used in the lead-obstacle stopping-speed
    # heuristic.
    # Increase -> rollout assumes stronger braking is available, so it allows
    # higher speed for the same gap.
    # Decrease -> rollout becomes more conservative.
    lead_obstacle_braking_deceleration_mps2: 1.5

  # MPC objective:
  #   J = Cost_Attractive + Cost_LaneCenter + Cost_Repulsive + Cost_Control
  cost:
    attractive:
      # Global weight on destination-state tracking.
      # Increase -> stronger pull to the active destination state.
      # Decrease -> more freedom for obstacle and lane costs to dominate.
      w_attractive: 1.0

      # State-tracking weights toward [x_ref, y_ref, v_ref, psi_ref].
      # Increase a component -> more importance for that state channel.
      # Decrease a component -> less importance for that channel.
      q_x: 1
      q_y: 0
      q_v: 3.0
      q_psi: 2.0

    lane_center_follow:
      # Enable/disable the lane-center-follow cost.
      enabled: true

      # Base lane-center weight at the first stage in:
      #   w_k = w0 * alpha^(k-1)
      # Increase -> stronger pull to the lane center and lane heading.
      # Decrease -> weaker lane-centering behavior.
      w0: 15.0

      # Additional heading-error weight inside the lane-center term:
      #   w_k * q_psi * wrap(psi - psi_lane)^2
      # Increase -> stronger lane-heading alignment.
      # Decrease -> lane-center cost behaves more like pure lateral position.
      q_psi: 0.0

      # Stage decay factor for lane-center weight.
      # Increase toward 1.0 -> far-horizon lane error matters more.
      # Decrease -> near-horizon lane error dominates.
      alpha: 0.97

    control:
      # Global weight on control smoothness.
      # Increase -> smoother accel/steer changes, but more sluggish motion.
      # Decrease -> more aggressive control changes.
      w_control: 30.0

      # Rate-change penalties:
      #   q_a     on ((a_k-a_{k-1})/dt)^2
      #   q_delta on ((delta_k-delta_{k-1})/dt)^2
      # Increase -> smoother change in that actuator.
      # Decrease -> faster actuator changes allowed.
      q_a: 10.0
      q_delta: 20 #50

    # Super-ellipsoid obstacle potential used in the live MPC objective.
    #
    # For each obstacle and stage:
    #   delta_s = max(0, 1 - r_s)
    #   delta_c = max(0, 1 - r_c)
    #   J_obs   = w_s * delta_s^2 + w_c * (exp(k_c * delta_c) - 1)
    #
    # r_s is the normalized distance to the larger safe zone and r_c is the
    # normalized distance to the tighter collision zone.
    repulsive_potential:
      enabled: true

      # Safe-zone weight w_s.
      # Increase -> stronger early caution in the outer safe zone.
      # Decrease -> weaker early avoidance push.
      w_safe_zone: 1.0e1

      # Collision-zone weight w_c.
      # Increase -> much stronger cost once the ego enters the red collision
      # zone. Decrease -> weaker collision response.
      w_collision_zone: 100.0

      # Exponential gain k_c inside the collision term.
      # Increase -> collision cost rises faster inside the collision zone.
      # Decrease -> gentler collision-zone growth.
      collision_exponential_gain: 6.0

      # Max braking deceleration [m/s^2] used for collision-zone inflation.
      # Increase -> tighter collision zone.
      # Decrease -> larger collision zone.
      max_braking_deceleration_mps2: 5.0

      # Comfort deceleration [m/s^2] used for safe-zone inflation.
      # Increase -> smaller safe zone.
      # Decrease -> larger, more cautious safe zone.
      comfort_deceleration_mps2: 2.0

      # Reaction time [s] added to the safe zone only.
      # Increase -> safe zone starts earlier.
      # Decrease -> safe zone starts later.
      reaction_time_s: 1.0

      # Static longitudinal geometry buffer [m] added after combining ego and
      # obstacle shape along the obstacle heading axis.
      # Increase -> larger front/rear clearance.
      # Decrease -> tighter longitudinal fit.
      static_longitudinal_buffer_m: 0.5

      # Static lateral geometry buffer [m] added after combining ego and
      # obstacle shape across the obstacle heading axis.
      # Increase -> larger side clearance.
      # Decrease -> tighter lateral fit.
      static_lateral_buffer_m: 1

      # Super-ellipsoid exponent n.
      # 2 -> ellipse-like. Larger values -> more rectangle-like rounded box.
      shape_exponent: 4.0

      # Minimum lateral approach speed [m/s] used to avoid zero-width lateral
      # dynamic inflation in near-parallel motion.
      # Increase -> more lateral caution even when relative lateral motion is
      # tiny. Decrease -> narrower lateral inflation for near-parallel traffic.
      min_lateral_approach_speed_mps: 0.1

      # Project the local obstacle-cost Hessian to positive semidefinite form so
      # OSQP sees a convex quadratic approximation.
      project_hessian_psd: true

      # Minimum eigenvalue kept during PSD projection.
      # Increase -> more numerical stability, but more curvature smoothing.
      # Decrease -> closer to the raw local Hessian, but less robust.
      min_hessian_eig: 1.0e-9

  solver:
    # Maximum OSQP iterations.
    # Increase -> solver gets more chances to converge.
    # Decrease -> faster failure on hard QPs.
    max_iter: 10000

    # Absolute feasibility/optimality tolerance.
    # Increase -> faster but less precise solve.
    # Decrease -> more accurate but potentially slower solve.
    eps_abs: 1.0e-3

    # Relative feasibility/optimality tolerance.
    # Increase -> looser stopping condition.
    # Decrease -> tighter solve accuracy target.
    eps_rel: 1.0e-3

    # Run OSQP polish after the main ADMM solve.
    # true -> can improve final solution accuracy at some extra cost.
    # false -> faster solve, but slightly rougher final result.
    polish: true
